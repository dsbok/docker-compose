services:
  ytdl-material:
    image: voc0der/ytdl-material:nightly
    container_name: ytdl-material
    restart: unless-stopped
    environment:
      - ytdl_use_local_db=true
      - write_ytdl_config=true
      - ytdl_multi_user_mode=true
    ports:
      - "17442:17442"
    volumes:
      - /opt/stacks/ytdl-material/appdata:/app/appdata
      - /opt/stacks/ytdl-material/audio:/app/audio
      - /opt/stacks/ytdl-material/video:/app/video
      - /opt/stacks/ytdl-material/subscriptions:/app/subscriptions
      - /opt/stacks/ytdl-material/users:/app/users
