name: forgejo
services:
  forgejo:
    container_name: forgejo
    environment:
      USER_GID: "1000"
      USER_UID: "1000"
    image: codeberg.org/forgejo/forgejo:14
    networks:
      forgejo: null
    ports:
      - mode: ingress
        target: 3000
        published: "3000"
        protocol: tcp
      - mode: ingress
        target: 22
        published: "222"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /opt/stacks/forgejo
        target: /data
        bind:
          create_host_path: true
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
        bind:
          create_host_path: true
networks:
  forgejo:
    name: forgejo_forgejo
    driver: bridge
