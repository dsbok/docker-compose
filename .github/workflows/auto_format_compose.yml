name: Docker Compose Auto Format (Official)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Docker Compose
        run: |
          docker compose version

      - name: Format all docker-compose files
        run: |
          set -e

          echo "Scanning repository..."

          find . -type f \( -name "docker-compose.yml" -o -name "docker-compose.yaml" \) | while read file; do
            echo "Formatting: $file"

            tmp="$(mktemp)"

            # Canonical normalization via official Docker tool
            docker compose -f "$file" config > "$tmp"

            # Overwrite original file
            mv "$tmp" "$file"
          done

      - name: Commit changes if any
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto-format docker-compose files (docker compose config)"
          git push
