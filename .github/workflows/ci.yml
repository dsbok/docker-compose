name: ci-format-validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  format-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install YAML tools
        run: pip install --no-cache-dir yamllint ruamel.yaml

      - name: Auto format YAML
        run: |
          set -e
          cat << 'EOF' > format_yaml.py
          import os
          from ruamel.yaml import YAML

          yaml = YAML()
          yaml.explicit_start = True
          yaml.indent(mapping=2, sequence=4, offset=2)

          for root, _, files in os.walk("."):
              for name in files:
                  if name.endswith((".yml", ".yaml")):
                      path = os.path.join(root, name)
                      try:
                          with open(path, "r") as f:
                              data = yaml.load(f)
                          if data is None:
                              continue
                          with open(path, "w") as f:
                              yaml.dump(data, f)
                          print(f"Formatted: {path}")
                      except Exception as e:
                          print(f"Skipped {path}: {e}")
          EOF
          python format_yaml.py

      - name: Lint YAML
        run: yamllint .

      - name: Validate docker-compose
        run: |
          set -e
          files=""
          for f in docker-compose.yml docker-compose.yaml compose.yml compose.yaml; do
            if [ -f "$f" ]; then
              files="$files -f $f"
            fi
          done

          if [ -z "$files" ]; then
            echo "No compose file found. Skipping."
            exit 0
          fi

          docker compose $files config > /dev/null

      - name: Commit fixes
        run: |
          set -e
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add .
            git commit -m "chore: auto format yaml"
            git push
          else
            echo "No changes to commit"
          fi
