name: nginx
services:
  web:
    container_name: nginx-php
    environment:
      TZ: Asia/Kuala_Lumpur
    image: trafex/php-nginx:latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 80
        published: "80"
        protocol: tcp
    restart: always
    volumes:
      - type: bind
        source: /opt/stacks/nginx
        target: /var/www/html
        bind:
          create_host_path: true
networks:
  default:
    name: nginx_default
