name: nginx
services:
  nginx:
    container_name: nginx
    environment:
      TZ: Asia/Kuala_Lumpur
    image: nginx:stable-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 80
        published: "80"
        protocol: tcp
    restart: always
    volumes:
      - type: bind
        source: /opt/stacks/nginx
        target: /usr/share/nginx/html
        read_only: true
        bind:
          create_host_path: true
networks:
  default:
    name: nginx_default
