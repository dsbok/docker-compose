name: metube
services:
  metube:
    container_name: metube
    image: ghcr.io/alexta69/metube
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8081
        published: "8081"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /opt/stacks/metube
        target: /downloads
        bind:
          create_host_path: true
networks:
  default:
    name: metube_default
