name: umbrel
services:
  umbrel:
    container_name: umbrel
    image: dockurr/umbrel
    networks:
      default: null
    pid: host
    ports:
      - mode: ingress
        target: 80
        published: "8082"
        protocol: tcp
    restart: always
    stop_grace_period: 1m0s
    volumes:
      - type: bind
        source: /opt/stacks/umbrel
        target: /data
        bind:
          create_host_path: true
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        bind:
          create_host_path: true
networks:
  default:
    name: umbrel_default
